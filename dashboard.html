<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReplitSuperHero.com Dashboard</title>
    <link rel="canonical" href="https://replitsuperhero.com/dashboard.html">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-P2C3KN7T');</script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            color: #FFFFFF;
            min-height: 100vh;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-form {
            background-color: #141414;
            border-radius: 8px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .login-form h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #FF6B35;
        }

        .login-form p {
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: #0A0A0A;
            border: 1px solid #333;
            border-radius: 4px;
            color: #FFFFFF;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #FF6B35;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #FF6B35;
            color: #000;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-btn:hover {
            background-color: #FF8552;
        }

        .error-message {
            color: #FF6B35;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            padding: 12px;
            background-color: rgba(255, 107, 53, 0.1);
            border-radius: 4px;
            border-left: 3px solid #FF6B35;
        }

        .error-message.show {
            display: block;
        }

        /* Dashboard Styles */
        .dashboard {
            display: none;
            min-height: 100vh;
        }

        .dashboard.active {
            display: block;
        }

        .navbar {
            background-color: #141414;
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            font-size: 20px;
            color: #FF6B35;
        }

        .logout-btn {
            background-color: #FF6B35;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .logout-btn:hover {
            background-color: #FF8552;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .section {
            margin-bottom: 50px;
        }

        .section h2 {
            font-size: 20px;
            margin-bottom: 25px;
            color: #FFFFFF;
        }

        .network-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .network-card {
            background-color: #141414;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #333;
            transition: all 0.3s;
            text-align: center;
        }

        .network-card:hover {
            border-color: #FF6B35;
            background-color: #1A1A1A;
        }

        .network-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .network-card h3 {
            font-size: 16px;
            color: #FFFFFF;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .network-card p {
            color: #999;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .network-card a {
            display: inline-block;
            color: #FF6B35;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s;
        }

        .network-card a:hover {
            color: #FF8552;
        }

        .cta-section {
            background-color: #141414;
            border: 2px solid #FF6B35;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-bottom: 40px;
        }

        .cta-section h3 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #FFFFFF;
        }

        .cta-section p {
            color: #999;
            margin-bottom: 25px;
            font-size: 16px;
        }

        .cta-btn {
            background-color: #FF6B35;
            color: #000;
            border: none;
            padding: 14px 32px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .cta-btn:hover {
            background-color: #FF8552;
        }

        .lookup-section {
            background-color: #141414;
            padding: 30px;
            border-radius: 8px;
            margin-top: 30px;
        }

        .lookup-section h3 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #FFFFFF;
        }

        .lookup-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lookup-form input {
            flex: 1;
            padding: 12px;
            background-color: #0A0A0A;
            border: 1px solid #333;
            border-radius: 4px;
            color: #FFFFFF;
            font-size: 14px;
        }

        .lookup-form input:focus {
            outline: none;
            border-color: #FF6B35;
        }

        .lookup-form button {
            padding: 12px 24px;
            background-color: #FF6B35;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .lookup-form button:hover {
            background-color: #FF8552;
        }

        .lookup-result {
            background-color: #0A0A0A;
            padding: 20px;
            border-radius: 4px;
            border-left: 4px solid #FF6B35;
            display: none;
        }

        .lookup-result.show {
            display: block;
        }

        .lookup-result p {
            margin-bottom: 8px;
            font-size: 14px;
        }

        .lookup-result strong {
            color: #FF6B35;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
            }

            .network-grid {
                grid-template-columns: 1fr;
            }

            .cta-section {
                padding: 30px 20px;
            }

            .lookup-form {
                flex-direction: column;
            }

            .login-form {
                padding: 30px 20px;
            }
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P2C3KN7T"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- Login Container -->
    <div class="login-container" id="loginContainer">
        <div class="login-form">
            <h1>ReplitSuperHero.com</h1>
            <p>Cloud Development Platform</p>
            <div class="error-message" id="errorMessage"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="navbar">
            <h1>ReplitSuperHero.com Dashboard</h1>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div class="container">
            <!-- Call-to-Action Section -->
            <div class="cta-section">
                <h3>Join the SuperHero Network</h3>
                <p>Get exclusive access to cloud development tools and AI-powered solutions</p>
                <button class="cta-btn" onclick="scrollToSignup()">Sign Up Now</button>
            </div>

            <!-- Network Overview Section -->
            <div class="section">
                <h2>SuperHero Network Overview</h2>
                <div class="network-grid" id="networkGrid">
                    <div class="loading">Loading network...</div>
                </div>
            </div>

            <!-- Lead Capture & Email Lookup Section -->
            <div class="section">
                <div class="lookup-section">
                    <h3>Search Lead by Email</h3>
                    <div class="lookup-form">
                        <input type="email" id="emailInput" placeholder="Enter email address...">
                        <button onclick="searchLead()">Search</button>
                    </div>
                    <div class="lookup-result" id="lookupResult"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_ENDPOINT = 'https://super-hero-api.replit.app/api/leads';
        const VALID_USERNAME = 'Jarvis.Stark1985';
        const VALID_PASSWORD = 'Superhero2026$';

        const SITES = [
            { name: 'TheAISuperHeroes.com', icon: 'ð¤', url: 'https://theaisuperheroes.com', subtitle: 'AI Solutions' },
            { name: 'ResumeSuperHero.com', icon: 'ð', url: 'https://resumesuperhero.com', subtitle: 'Career Tools' },
            { name: 'ShopifySuperHero.com', icon: 'ðï¸', url: 'https://shopifysuperhero.com', subtitle: 'E-commerce' },
            { name: 'SEOAISuperHero.com', icon: 'ð', url: 'https://seoaisuperhero.com', subtitle: 'SEO & AI' },
            { name: 'MCPSuperHero.com', icon: 'ð', url: 'https://mcpsuperhero.com', subtitle: 'MCP Platform' },
            { name: 'ReplitSuperHero.com', icon: 'âï¸', url: 'https://replitsuperhero.com', subtitle: 'Cloud Dev' },
            { name: 'ClaudSuperHero.com', icon: 'ð§ ', url: 'https://claudsuperhero.com', subtitle: 'Claude AI' },
            { name: 'AgenticSuperHero.com', icon: 'ð¤', url: 'https://agenticsuperhero.com', subtitle: 'Agent Tools' },
            { name: 'URLSuperHero.com', icon: 'ð', url: 'https://urlsuperhero.com', subtitle: 'URL Tools' },
            { name: 'StartBizSuperHero.com', icon: 'ð', url: 'https://startbizsuperhero.com', subtitle: 'Business' }
        ];

        let allLeads = [];

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                localStorage.setItem('dashboardLoggedIn', 'true');
                showDashboard();
                renderNetworkCards();
                fetchLeads();
            } else {
                showError('Invalid username or password');
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 4000);
        }

        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
        }

        function hideDashboard() {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        function handleLogout() {
            localStorage.removeItem('dashboardLoggedIn');
            hideDashboard();
        }

        function renderNetworkCards() {
            const grid = document.getElementById('networkGrid');
            grid.innerHTML = SITES.map(site => `
                <div class="network-card">
                    <div class="network-icon">${site.icon}</div>
                    <h3>${site.name}</h3>
                    <p>${site.subtitle}</p>
                    <a href="${site.url}" target="_blank">Visit â</a>
                </div>
            `).join('');
        }

        async function fetchLeads() {
            try {
                const response = await fetch(API_ENDPOINT);
                if (!response.ok) throw new Error('API request failed');
                const data = await response.json();
                allLeads = Array.isArray(data) ? data : data.leads || [];
            } catch (error) {
                console.error('Failed to fetch leads:', error);
            }
        }

        function searchLead() {
            const email = document.getElementById('emailInput').value.toLowerCase();
            const resultEl = document.getElementById('lookupResult');

            if (!email) {
                resultEl.classList.remove('show');
                return;
            }

            const lead = allLeads.find(l => (l.email || '').toLowerCase() === email);

            if (lead) {
                const status = lead.converted ? 'Converted' : 'Pending';
                resultEl.innerHTML = `
                    <p><strong>Name:</strong> ${lead.name || 'N/A'}</p>
                    <p><strong>Email:</strong> ${lead.email || 'N/A'}</p>
                    <p><strong>Phone:</strong> ${lead.phone || 'N/A'}</p>
                    <p><strong>Status:</strong> ${status}</p>
                `;
            } else {
                resultEl.innerHTML = '<p style="color: #999;">No lead found with this email.</p>';
            }

            resultEl.classList.add('show');
        }

        function scrollToSignup() {
            document.getElementById('emailInput').focus();
            document.getElementById('emailInput').scrollIntoView({ behavior: 'smooth' });
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            if (localStorage.getItem('dashboardLoggedIn') === 'true') {
                showDashboard();
                renderNetworkCards();
                fetchLeads();
            }
        });

        // Allow Enter key to search
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.activeElement.id === 'emailInput') {
                searchLead();
            }
        });
    </script>
</body>
</html>
